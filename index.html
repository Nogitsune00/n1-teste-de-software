<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Pedidos (Loja Online)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Sistema de Gestão de Pedidos (Loja Online)</h1>

    <section>
    <form id="FormCadastro" onsubmit="event.preventDefault();" class="flex">
            <label>Nome:</label>
            <input type="text" id="nome" required>

            <label>Preço (R$):</label>
            <input type="number" id="preco" step="0.01" min="0.01" required>

            <label>Estoque:</label>
            <input type="number" id="estoque" min="1" required>

            <label>Categoria:</label>
            <select id="categoria">
                <option value="">Selecione...</option>
                <option value="Eletrônicos">Eletrônicos</option>
                <option value="Periféricos">Periféricos</option>
                <option value="Hardware">Hardware</option>
            </select>

            <br><br>
            <button type="button" onclick="cadastrarProduto()" class="sucess">Cadastrar Produto</button>
        </form>
    </section>

    <div class="flex">
            <input type="text" id="search" placeholder="Digite o ID">
            <button onclick="buscar()" class="sucess">Buscar Produto</button>
            <button onclick="limparBusca()" class="alert">Limpar Busca</button>
        </div>
        <br>

    <hr>

    <section>
        <h2>Catálogo de Produtos</h2>
        <table border="1" width="100%">
            <tbody id="produtos">
                <tr><td colspan="6">Nenhum produto cadastrado.</td></tr>
            </tbody>
        </table>
    </section>

    <hr>

    <section>
        <h2>Seu Carrinho de Compras</h2>
        
        <div class="flex">
            <h3>Adicionar Item</h3>
            <input type="number" id="idProdutoCarrinho" placeholder="ID do Produto">
            <input type="number" id="quantidadeCarrinho" placeholder="Quantidade">
            <button onclick="adicionarAoCarrinho()" class="sucess">Adicionar ao Carrinho</button>
        </div>

        <div class="flex">
            <h3>Remover Item</h3>
            <input type="number" id="idRemoverCarrinho" placeholder="ID do Produto no Carrinho">
            <button onclick="removerDoCarrinho()" class="danger">Remover do Carrinho</button>
        </div>
    </section>

    <hr>

    <section>
        <h2>Finalizar Compra</h2>
        <div class="flex">
            <input type="text" id="nomeCliente" placeholder="Nome do Cliente">
            <input type="text" id="cupomDesconto" placeholder="Cupom (Ex: DESC10)">
        </div>
        
        <br><br>
        <button onclick="fecharPedido()" class="center sucess" >Fechar Pedido</button>
    </section>
    
    <div id="modalEdicao" class="modal">
        <div class="modal-conteudo">
            <h2>Editar Produto</h2>

            <input type="hidden" id="editId">

            <div class="form-group-modal">
                <label>Nome:</label>
                <input type="text" id="editNome">
            </div>

            <div class="form-group-modal">
                <label>Preço:</label>
                <input type="number" id="editPreco" step="0.01">
            </div>

            <div class="form-group-modal">
                <label>Estoque:</label>
                <input type="number" id="editEstoque">
            </div>

            <div class="form-group-modal">
                <label>Categoria:</label>
                <select id="editCategoria">
                    <option value="">Selecione...</option>
                    <option value="Eletrônicos">Eletrônicos</option>
                    <option value="Periféricos">Periféricos</option>
                    <option value="Hardware">Hardware</option>
                </select>
            </div>

            <br>
            <div class="botoes-modal">
                <button onclick="atualizarProduto()" class="sucess">Salvar</button>
                <button onclick="document.getElementById('modalEdicao').style.display='none'" class="alert">Cancelar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
